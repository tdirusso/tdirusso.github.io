<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Point Psychiatry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">

  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      font-family: "Roboto", sans-serif;
      box-sizing: border-box;
      color: #121212;
    }

    header {
      width: 100%;
      background: #f7f7f7;
      height: 175px;
    }

    header .content {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header .content .contact {
      font-weight: 200;
      font-size: 1.25rem;
      flex-basis: 40%;
    }

    header .content .contact p {
      margin: 10px 0;
    }

    header .content .contact p strong {
      font-weight: 400;
    }

    .main {
      position: relative;
      padding: 25px;
    }

    .main h1 {
      font-size: 2.75rem;
      font-weight: 300;
      margin: 0;
      text-align: center;
      margin-top: 25px;
      color: white;
    }

    .mission {
      position: relative;
    }

    .mission img {
      width: 100%;
      opacity: 0.25;
    }

    .main img {
      width: 100%;
    }

    .main .content {
      position: absolute;
      top: 35%;
      color: white;
      text-align: center;
      width: 100%;
    }

    .main .content h1 {
      font-weight: 600;
      font-size: 3.25rem;
    }

    .request-btn,
    .contact-btn {
      background: #00417f;
      color: #fff;
      padding: 20px 30px;
      border-radius: 5px;
      text-shadow: none;
      font-size: 1.3rem;
      font-weight: 300;
      transition: 250ms;
      max-width: 350px;
      margin: 0 auto;
      margin-top: 50px;
      outline: none;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .request-btn:hover,
    .contact-btn:hover {
      background: #0078eb;
    }

    .about {
      padding: 75px 25px;
    }

    .about .content {
      text-align: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .about .content h2 {
      font-weight: 300;
    }

    .treat {
      padding: 75px 25px;
      background: #00417f;
      color: white;
    }

    .treat .content {
      text-align: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .treat .content h1 {
      font-weight: 300;
      font-size: 2.75rem;
    }

    .treat .list {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .treat .list ul {
      list-style: none;
      padding: 0;
      font-size: 2rem;
      font-weight: 200;
      margin: 0 75px;
    }

    .treat .list li {
      margin: 40px 0;
    }

    .contact-btn {
      font-size: 1.1rem;
    }

    .mission .content {
      position: absolute;
      top: 15%;
      color: #121212;
      text-align: center;
      width: 100%;
      width: 100%;
    }

    .mission .content .statement {
      max-width: 1200px;
      margin: 0 auto;
    }

    .mission .content .statement h1 {
      font-size: 2.75rem;
      font-weight: 300;
    }

    .mission .content .statement p {
      font-weight: 300;
      font-size: 1.5rem;
    }


    @media only screen and (max-width: 850px) {
      header {
        height: auto;
      }

      header img {
        height: 50px;
      }

      header p {
        font-size: 20px !important;
        font-weight: 300 !important;
      }

      .main .content {
        top: 15%;
      }

      .main .content h1 {
        font-size: 2.5rem;
        margin-bottom: 200px !important;
      }

      .request-btn {
        font-size: 1rem;
      }

      .treat .content h1 {
        font-size: 2.2rem;
      }

      .treat .list ul {
        margin: 0 25px;
        font-size: 1.35rem;
      }

      .mission {
        max-height: unset;
      }

      .mission img {
        height: 1000px;
        position: relative;
        left: -250px;
        width: auto;
      }

      .main img {
        height: 700px;
        position: relative;
        left: -100px;
        width: auto;
      }
    }

    @media only screen and (max-width: 767px) {

      header .content {
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      header .content {
        padding-top: 15px;
        padding-bottom: 15px;
      }

      .main {
        max-height: 1000px;
      }

      .main img {
        left: -150px;
      }

      .main .content {
        top: 20%;
      }

      .main .content h1 {
        margin-bottom: 100px !important;
      }


      .mission img {
        height: 1500px;
        left: -800px;
      }

      .main h1 {
        margin-bottom: 25px;
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="content">
      <img src="./logo.png" alt="" height="75" style="cursor: pointer;" onclick="window.location.href = '/'">
      <div class="contact">
        <p><strong>Phone</strong> &mdash; (xxx) xxx-xxxx</p>
        <p><strong>Fax</strong> &mdash; (xxx) xxx-xxxx</p>
        <p style="font-size: 1.1rem; margin-top: 15px">Call for appointments M-F 8am-5pm. Appointments may be outside of
          call hours</p>
      </div>
    </div>
  </header>
  <section class="main" style="background: #00417f">
    <h1>Request Your Appointment</h1>
    <!-- Calendly inline widget begin -->
<div class="calendly-inline-widget" data-url="https://calendly.com/timgdirusso/60min" style="min-width:320px;height:630px;"></div>
<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
<!-- Calendly inline widget end -->
  </section>
</body>

</html>
